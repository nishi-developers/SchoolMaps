services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
      - repo-web-node-modules:/workspace/node_modules
      - repo-web-nuxt:/workspace/.nuxt
      - /workspace/.output
    ports:
      - "3000:3000"
    command: >
      sh -c "chown -R node:node /workspace &&
        su node -c 'sleep infinity'"
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true

volumes:
  repo-web-node-modules:
  repo-web-nuxt: